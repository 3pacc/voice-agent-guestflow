version: '3.8'

services:
  fastapi_app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLM_BASE_URL=http://vllm:8000/v1
      - LLM_API_KEY=EMPTY
      - LLM_MODEL=${LLM_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}
    depends_on:
      - vllm
    volumes:
      - ./hotel_stock.db:/app/hotel_stock.db

  vllm:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
    command: --model ${LLM_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct} --dtype auto --api-key EMPTY --max-model-len 8192 --gpu-memory-utilization 0.8
    ports:
      - "8001:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    shm_size: '10g'
